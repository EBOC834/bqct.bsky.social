name: Run Digest
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py310-deps-${{ hashFiles('**/requirements.txt') }}
      - run: pip install httpx PyNaCl pyyaml beautifulsoup4 trafilatura
      - name: Cache model
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ runner.os }}-qwen25-coder-14b-q5km
      - name: Download model
        run: |
          mkdir -p models
          F="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          if [ ! -f "$F" ] || [ $(stat -c%s "$F") -lt 1000000000 ]; then
            curl -L --retry 3 --retry-delay 10 -o "$F" "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"
          fi
      - uses: actions/cache@v4
        with:
          path: state/
          key: ${{ runner.os }}-bot-timers
      - name: Run Digest
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python core/digest.py
      - uses: actions/cache@v4
        with:
          path: state/
          key: ${{ runner.os }}-bot-timers
