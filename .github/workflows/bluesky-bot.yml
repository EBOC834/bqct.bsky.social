name: Bluesky AI Bot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py310-deps-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py310-deps-

      - name: Install minimal dependencies
        run: pip install httpx PyNaCl

      - name: Check notifications
        id: check
        continue-on-error: true
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
        run: python check.py

      - name: Check if run is needed
        id: check-run
        continue-on-error: true
        env:
          LAST_NEWS: ${{ secrets.LAST_NEWS }}
        run: |
          if [ -f work_data.json ]; then
            echo "Notifications found. Running bot."
            exit 0
          fi
          
          python -c "
          import os
          from datetime import datetime, timezone
          raw = os.getenv('LAST_NEWS', '').strip()
          if not raw or raw == '{}' or raw == 'null':
              print('LAST_NEWS empty. Running bot.')
              exit(0)
          try:
              last_ts = datetime.fromisoformat(raw.replace('Z', '+00:00'))
              diff = datetime.now(timezone.utc) - last_ts
              if diff.total_seconds() >= 6 * 3600:
                  print('6h passed. Running bot.')
                  exit(0)
              else:
                  print('Not 6h yet. Exiting.')
                  exit(1)
          except Exception as e:
              print(f'Error: {e}. Running bot.')
              exit(0)
          "

      - name: Install full dependencies
        if: steps.check-run.outcome == 'success'
        run: pip install beautifulsoup4 llama-cpp-python trafilatura

      - name: Cache model
        if: steps.check-run.outcome == 'success'
        uses: actions/cache@v4
        with:
          path: models/qwen2.5-coder-14b-instruct-q5_k_m.gguf
          key: ${{ runner.os }}-qwen25-coder-14b-q5km
          restore-keys: |
            ${{ runner.os }}-qwen25-coder-

      - name: Download model if not cached
        if: steps.check-run.outcome == 'success'
        run: |
          mkdir -p models
          FILE="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          if [ ! -f "$FILE" ] || [ $(stat -c%s "$FILE") -lt 1000000000 ]; then
            echo "Downloading model..."
            curl -L --retry 3 --retry-delay 10 -o "$FILE" \
            "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 1000000000 ]; then
              echo "Download failed"
              exit 1
            fi
          else
            echo "Model already cached"
          fi

      - name: Run Bot
        if: steps.check-run.outcome == 'success'
        env:
          LAST_NEWS: ${{ secrets.LAST_NEWS }}
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
          CONTEXT_SECRET_COUNT: 10
          CONTEXT_0: ${{ secrets.CONTEXT_0 }}
          CONTEXT_1: ${{ secrets.CONTEXT_1 }}
          CONTEXT_2: ${{ secrets.CONTEXT_2 }}
          CONTEXT_3: ${{ secrets.CONTEXT_3 }}
          CONTEXT_4: ${{ secrets.CONTEXT_4 }}
          CONTEXT_5: ${{ secrets.CONTEXT_5 }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python bot.py
