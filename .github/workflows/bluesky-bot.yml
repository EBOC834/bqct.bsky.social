name: Bluesky Bot (Optimized)

on:
  schedule:
    - cron: '*/50 * * * *'
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v1

      - name: Install minimal deps (for check)
        run: pip install httpx PyNaCl

      - name: Check Notifications
        id: check
        continue-on-error: true
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
        run: python check.py

      - name: Exit if no work
        if: steps.check.outcome != 'success'
        run: echo "No new notifications. Saving resources." && exit 0

      - name: Install full deps (for bot)
        if: steps.check.outcome == 'success'
        run: pip install beautifulsoup4 llama-cpp-python

      - name: Cache Model
        uses: actions/cache@v4
        with:
          path: models/Qwen3-14B-Q4_K_M.gguf
          key: ${{ runner.os }}-qwen3-14b-gguf-v1

      - name: Download Model if missing
        if: steps.check.outcome == 'success'
        run: |
          mkdir -p models
          FILE="models/Qwen3-14B-Q4_K_M.gguf"
          if [ ! -f "$FILE" ] || [ $(stat -c%s "$FILE") -lt 1000000000 ]; then
            echo "Downloading Qwen3-14B..."
            curl -L -o "$FILE" "https://huggingface.co/Qwen/Qwen3-14B-GGUF/resolve/main/Qwen3-14B-Q4_K_M.gguf?download=true"
          fi

      - name: Run Bot
        if: steps.check.outcome == 'success'
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python fresh_bot.py
