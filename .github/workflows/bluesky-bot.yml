name: Bluesky Bot (Optimized)
on:
  schedule:
    - cron: '*/50 * * * *'
  workflow_dispatch:
jobs:
  check-and-run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/lib/python3.10/site-packages
            ~/.cache/pip
          key: ${{ runner.os }}-py310-deps-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py310-deps-
      - name: Install minimal deps
        run: pip install --user --quiet --upgrade-strategy only-if-needed httpx PyNaCl
      - name: Check Notifications
        id: check
        continue-on-error: true
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
        run: python check.py
      - name: Cache Model
        if: steps.check.outputs.has_work == 'true'
        uses: actions/cache@v4
        with:
          path: models/qwen2.5-14b-instruct-q4_k_m.gguf
          key: ${{ runner.os }}-qwen25-14b-instruct-ms-gguf-v1
      - name: Install bot deps
        if: steps.check.outputs.has_work == 'true'
        run: pip install --user --quiet -r requirements.txt
      - name: Verify Model
        if: steps.check.outputs.has_work == 'true'
        run: |
          FILE="models/qwen2.5-14b-instruct-q4_k_m.gguf"
          if [ -f "$FILE" ] && [ $(stat -c%s "$FILE") -gt 8000000000 ]; then
            chmod +r "$FILE"
            echo "Model verified: $(stat -c%s "$FILE") bytes"
          else
            echo "Downloading Qwen2.5-14B from ModelScope..."
            mkdir -p models
            pip install --user --quiet modelscope
            modelscope download --model='qwen/Qwen2.5-14B-Instruct-GGUF' --include 'qwen2.5-14b-instruct-q4_k_m.gguf' --local_dir './models'
          fi
      - name: Run Bot
        if: steps.check.outputs.has_work == 'true'
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python bot.py
