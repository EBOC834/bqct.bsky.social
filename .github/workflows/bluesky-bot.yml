name: Bluesky Bot (Optimized)
on:
  schedule:
    - cron: '*/50 * * * *'
  workflow_dispatch:
jobs:
  check-and-run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/lib/python3.10/site-packages
            ~/.cache/pip
          key: ${{ runner.os }}-py310-deps-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py310-deps-
      - name: Install minimal deps
        run: pip install --user --quiet --upgrade-strategy only-if-needed httpx PyNaCl
      - name: Check Notifications
        id: check
        continue-on-error: true
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
        run: python check.py
      - name: Cache Model
        if: steps.check.outputs.has_work == 'true'
        uses: actions/cache@v4
        with:
          path: models/Qwen3-14B-Q4_K_M.gguf
          key: ${{ runner.os }}-qwen3-14b-gguf-v1
      - name: Install bot deps
        if: steps.check.outputs.has_work == 'true'
        run: pip install --user --quiet -r requirements.txt
      - name: Free Disk Space for Model
        if: steps.check.outputs.has_work == 'true'
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          df -h
      - name: Verify Model
        if: steps.check.outputs.has_work == 'true'
        run: |
          FILE="models/Qwen3-14B-Q4_K_M.gguf"
          if [ -f "$FILE" ]; then
            chmod +r "$FILE"
            echo "Verifying SHA256..."
            HASH=$(sha256sum "$FILE" | awk '{print $1}')
            echo "Hash: $HASH"
            if [ "$HASH" != "500a8806e85ee9c83f3ae08420295592451379b4f8cf2d0f41c15dffeb6b81f0" ]; then
              echo "ERROR: Model file corrupted! Redownloading..."
              rm "$FILE"
              pip install --user --quiet modelscope
              modelscope download --model 'Qwen/Qwen3-14B-GGUF' --include '*Q4_K_M.gguf' --local_dir './models'
            else
              echo "Model verified successfully."
            fi
          else
            echo "Model missing, downloading from ModelScope..."
            pip install --user --quiet modelscope
            modelscope download --model 'Qwen/Qwen3-14B-GGUF' --include '*Q4_K_M.gguf' --local_dir './models'
          fi
      - name: Run Bot
        if: steps.check.outputs.has_work == 'true'
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python bot.py
