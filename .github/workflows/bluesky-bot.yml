name: Bluesky Bot (Optimized)
on:
  schedule:
    - cron: '*/50 * * * *'
  workflow_dispatch:
jobs:
  check-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/lib/python3.10/site-packages
            ~/.cache/pip
          key: ${{ runner.os }}-py310-deps-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py310-deps-
      - name: Install minimal deps
        run: pip install --user --quiet --upgrade-strategy only-if-needed httpx PyNaCl
      - name: Check Notifications
        id: check
        continue-on-error: true
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
        run: python check.py
      - name: Cache Model
        if: steps.check.outputs.has_work == 'true'
        uses: actions/cache@v4
        with:
          path: models/Qwen3-14B-Q4_K_M.gguf
          key: ${{ runner.os }}-qwen3-14b-gguf-v1
      - name: Install deps
        if: steps.check.outputs.has_work == 'true'
        run: |
          CMAKE_ARGS="-DLLAMA_BLAS=OFF" pip install --user --quiet --only-binary :all: --no-binary llama-cpp-python -r requirements.txt
      - name: Download Model from ModelScope if missing
        if: steps.check.outputs.has_work == 'true'
        run: |
          mkdir -p models
          FILE="models/Qwen3-14B-Q4_K_M.gguf"
          if [ ! -f "$FILE" ] || [ $(stat -c%s "$FILE") -lt 1000000000 ]; then
            pip install --user --quiet modelscope
            modelscope download --model 'Qwen/Qwen3-14B-GGUF' --include '*Q4_K_M.gguf' --local_dir './models'
          fi
      - name: Run Bot
        if: steps.check.outputs.has_work == 'true'
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python bot.py
