name: Process Queue
on:
  workflow_run:
    workflows: ["Check Notifications"]
    types: [completed]
jobs:
  process:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        env:
          CMAKE_ARGS: "-DGGML_BLAS=OFF -DGGML_CUDA=OFF"
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --prefer-binary -r requirements.txt
      - name: Cache model
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ runner.os }}-qwen25-coder-14b-q5km
      - name: Download model
        run: |
          mkdir -p models
          F="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          if [ ! -f "$F" ] || [ $(stat -c%s "$F") -lt 1000000000 ]; then
            curl -L --retry 3 --retry-delay 10 -o "$F" "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"
          fi
      - uses: actions/cache@v4
        with:
          path: state/
          key: ${{ runner.os }}-bot-state-${{ github.event.workflow_run.id }}
      - name: Run Processor
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python core/processor.py
      - uses: actions/cache@v4
        with:
          path: state/
          key: ${{ runner.os }}-bot-state-${{ github.event.workflow_run.id }}
