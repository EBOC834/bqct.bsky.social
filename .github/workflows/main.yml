name: Run Bot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache deps and model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            models/
          key: ${{ runner.os }}-py310-deps-model-${{ hashFiles('requirements.txt', 'config.py') }}
      - name: Install deps
        run: pip install httpx PyNaCl
      - name: Check if bot should run
        id: check
        run: |
          python3 << 'EOF'
          import os
          from datetime import datetime, timezone
          has_notifications = os.path.exists('work_data.json')
          def is_timer_expired(secret_name, hours):
              raw = os.getenv(secret_name, '').strip()
              if not raw or raw == "{}" or raw == "null":
                  return True
              try:
                  last_ts = datetime.fromisoformat(raw.replace("Z", "+00:00"))
                  diff = datetime.now(timezone.utc) - last_ts
                  return diff.total_seconds() >= hours * 3600
              except:
                  return True
          needs_full = is_timer_expired("LAST_FULL_DIGEST", 1)
          needs_mini = is_timer_expired("LAST_MINI_DIGEST", 3)
          needs_news = needs_full or needs_mini
          run_bot = has_notifications or needs_news
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"status={'true' if run_bot else 'false'}\n")
          EOF
        env:
          LAST_FULL_DIGEST: ${{ secrets.LAST_FULL_DIGEST }}
          LAST_MINI_DIGEST: ${{ secrets.LAST_MINI_DIGEST }}
      - name: Run bot
        if: steps.check.outputs.status == 'true'
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          BOT_DID: ${{ secrets.BOT_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          MODEL_PATH: ${{ secrets.MODEL_PATH }}
        run: python bot.py
